<!DOCTYPE html>
<html>

<head>
  <title>StateChart Data Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css" type="text/css">
  <style>
    .the-grid {
      display: grid;
      grid-template-columns: auto 6rem 1fr;
      column-gap: 0.5rem;
    }

    .the-display,
    .the-input {
      border: solid thin silver;
    }

    button {
      width: 100%;
    }

    :root {
        .txn {
            --node-min-width: 2rem;
            --node-bg: #fdd;
        }
        .state {
            --node-radius: 0.2rem;
            --node-min-width: 5rem;
            --node-bg: #dfd;
        }
    }
    .map-container {
        min-height: 50vh;
        padding-top: 0.5rem;
        background-color: #eee;
    }
  </style>
</head>

<body>
    <main>
        <h2>StateChart Data Editor</h2>
        <div class="the-grid">
          <div>
            <span class="label">Input</span>
            <a href="https://sketch.systems/tutorials/five-minute-introduction/">Format docs</a>
          </div>
          <span class="label">Convert</span>
          <span class="label">Output</span>
          <div class="the-input">
            <textarea rows="20" cols="60" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
          </div>
      
          <div class="the-controls">
            <button id="b0">Raw</button>
            <button id="b1">DOT</button>
            <button id="b2">DOT2</button>
            <button id="b3">Bi-graph</button>
            <!-- <button id="b4">XState</button> -->
          </div>
      
          <div class="the-display">
            <textarea rows="20" cols="60" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
          </div>
        </div>
        To convert the DOT format to an image using GraphViz, try
        <a href="https://edotor.net/">this site</a> or
        <a href="https://stamm-wilbrandt.de/GraphvizFiddle/">this one</a>.

        <!-- <range-slider label="Zoom" show-value label-pos="n" range="0.1,5" step="0.01"></range-slider> -->
        <div class="map-container">
            <argument-map></argument-map>
        </div>
    </main>
</body>
<!-- <script src="../_common/componentRangeSlider.js" type="module"></script> -->
<script src="../_common/argumentMapComponent.js" type="module"></script>
<script src="../_common/argumentNodeComponent.js" type="module"></script>
<script src="./stateChartEdit.js" type="module" ></script>
</html>
