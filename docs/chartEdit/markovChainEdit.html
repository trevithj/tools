<!DOCTYPE html>
<html>

<head>
    <title>Markov Chain Data Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles.css" type="text/css">
    <style>
        :root {
            --node-txtn-color-bg: white;
            .txtn {
                --node-bg: blue;
                --node-colour: white;
                --node-min-width: 2rem;
            }
        }
        .the-grid {
            display: grid;
            grid-template-columns: auto 6rem 1fr;
            column-gap: 0.5rem;
        }

        .the-display,
        .the-input {
            border: solid thin silver;
        }
        .map-frame {
            height: 70vh;
            width: 100%;
        }            
        button {
            width: 100%;
        }
        #the-chart {
            width: 100%;
            height: 600px;
        }
    </style>
</head>

<body>
    <main>
        <h2>Markov Chain Editor</h2>
        <div class="the-grid">
            <span class="label">Input</span>
            <span class="label">Convert</span>
            <span class="label">Output</span>
            <div class="the-input">
                <textarea rows="12" cols="60" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
            </div>

            <div class="the-controls">
                <button id="b0">Raw</button>
                <button id="b4">Bi-Graph</button>
                <button id="b1">Chart</button>
                <button id="b2">Matrix</button>
                <button id="b3">A^20</button>
            </div>

            <div class="the-display">
                <textarea rows="12" cols="60" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
            </div>
        </div>
        <div class="map-frame">
            <argument-map width="100%" height="70vh"></argument-map>
        </div>
        <div id="chart">
            <base-svg id="the-chart" width="800" height="400"></base-svg>
            <range-slider range="0.1,3" step="0.1" value="1" show-value></range-slider>
        </div>
    </main>
</body>
<script src="../_common/componentArgumentMap.js" type="module"></script>
<script src="../_common/componentArgumentNode.js" type="module"></script>
<script src="../_common/componentBaseSVG.js" type="module"></script>
<script src="../_common/componentRangeSlider.js" type="module"></script>
<script src="./markovChainEdit.js" type="module"></script>

</html>
