<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Argument Map</title>
    <style>
        :root {
            --node-bg: #fcc;
            --node-min-width: 100px;
            --node-max-width: 300px;
            --node-min-height: 2rem;
            .sub {
                --node-bg: #ccf;
                --node-border: 4px dotted red;
                --node-padding: 0.4rem;
                --node-radius: 1.2rem;
                --node-min-height: 1rem;
                --node-min-width: 1rem;
                --node-max-width: 200px;
            }
        }
        argument-node#a1 {
            --node-colour: #339;
            --node-font: Arial;
            --node-radius: 0px;
        }
    </style>
</head>

<body>
    <argument-map width="600px" height="400px" links="a1->a3,a2->a3,a3->a4,a4->a5,a4->a6">
        <argument-node id="a1" text="Socrates is a man" x="100" y="0"></argument-node>
        <argument-node id="a2" text="All men are mortal" x="400" y="0"></argument-node>
        <argument-node id="a3" text="therefore" x="310" y="120" class="sub"></argument-node>
        <argument-node id="a4" text="Socrates is mortal" x="275" y="200"></argument-node>
        <argument-node id="a7" text="Let's see how well sub-nodes handle really long lines of text." x="100" y="300" class="sub"></argument-node>
        <argument-node id="a8" text="Let's see how well text nodes handle really long lines of text." x="400" y="300"></argument-node>
    </argument-map>
    <div style="bottom:0px; position:absolute;">
        <input-numbers></input-numbers>
    </div>
</body>
<script type="module" src="../_common/componentArgumentMap"></script>
<script type="module" src="../_common/componentArgumentNode"></script>
<script type="module" src="../_common/componentInputNumbers.js"></script>
