<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>base-svg demo</title>
    <script src="../../_common/componentBaseSVG.js" defer type="module"></script>
    <script src="../../_common/componentRangeSlider.js" defer type="module"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 {
            margin: 0 0 .25rem;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #555;
        }

        /* Default — no override; shows lightblue */
        .demo-default base-svg {
            width: 400px;
            height: 200px;
            border: solid thin grey;
            /* --graph-bg: coral; */
        }
        .grid {
            display: grid;
            gap: 10px;
            grid-template-columns: auto 1fr auto;
        }
        .ll {
            grid-column: 2;
            grid-row: 3;
        }
        .bb {
            grid-column:2;
            grid-row:2
        }
        input {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="demo-default">
        <h2>Default fill (lightblue) — size="400x200"</h2>
        <base-svg width="400" height="200"></base-svg>
    </div>
    <range-slider range="0.1,4" step="0.01" value="1" label="Scale" label-pos="n" show-value></range-slider>
</body>
<!-- <script src="addTrialShapes.js" type="module"></script> -->
<script type="module">
    import { makeShapes} from "./addTrialShapes";
    const shapes = makeShapes(400, 200);
    const el = document.querySelector("base-svg");
    el.append(...shapes);

    const scaler = document.querySelector("range-slider");
    // const scaler = document.querySelector("input[name='scale-input']");
    scaler.addEventListener("input", evt => {
        const scale = parseFloat(evt.target.value) || 1;
        el.zoom = scale;
    })
</script>
</html>
