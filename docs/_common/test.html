<html>

<head>
    <title>Testing</title>
    <style>
        :root {
            --node-text-color-bg: #ffeeff;
            --node-text-color-fg: black;
            --node-gate-color-bg: green;
            --node-gate-color-fg: silver;
            --edge-color: magenta;
            --graph-color-bg: silver;
        }
        .frame {
            width: 100%;
            height: 400px;
            border: solid thin red;
            overflow: hidden;
        }
        base-svg {
            width: 100%;
        }
        .header {
            position: sticky;
            top: 0;
            background-color: silver;
            z-index: 10;
        }

    </style>
    <script type="module" src="componentBiGraph.js"></script>
    <script type="module" src="componentBaseSVG.js"></script>
    <script type="module" src="argumentMapComponent.js"></script>
    <script type="module" src="argumentNodeComponent.js"></script>

</head>

<body>
    <div class="header"><button class="zoom">+</button><button class="zoom">-</button></div>

    <div class="frame">
        <argument-map width="600px" height="400px"></argument-map>
    </div>
    <div id="footerText">Argument Map test</div>

    <div class="frame">
        <bi-graph id="test" viewbox="0,0,600,400"></bi-graph>
    </div>
    <div id="footerText">Bi-Graph test</div>
    
    <div class="frame">
        <base-svg id="test" width="600" height="400"></base-svg>
    </div>
    <div id="footerText">Base SVG Version 2 test</div>
</body>
<script src="./test.js" type="module"></script>
</html>
